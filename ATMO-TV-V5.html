<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atmosphere Entertainment Link</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#080808;
color:white;
font-family:system-ui,sans-serif;
overflow-x:hidden;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.logoWrap{
position:relative;
display:flex;
align-items:center;
gap:18px;
}

.logoGlow{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:320px;
height:320px;
border-radius:50%;
background:radial-gradient(circle,rgba(28,231,131,.55),transparent 70%);
animation:slowPulse 4s ease-in-out infinite;
filter:blur(20px);
}

@keyframes slowPulse{
0%,100%{opacity:.25;transform:translate(-50%,-50%) scale(.9)}
50%{opacity:.9;transform:translate(-50%,-50%) scale(1.2)}
}

.logo{
width:140px;
position:relative;
z-index:2;
}

.tv{
font-size:4rem;
font-weight:300;
position:relative;
z-index:2;
}

.hidden{display:none}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#171717,#000);
}

.card{
width:420px;
padding:35px;
border-radius:22px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
}

.card input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

.card button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1CE783;
font-weight:bold;
cursor:pointer;
}

/* HOME */
header{
position:fixed;
top:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);
z-index:999;
}

.hero{
height:100vh;
background:
linear-gradient(to top,#080808 0%,transparent 60%),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1800&auto=format&fit=crop") center/cover;
display:flex;
align-items:flex-end;
padding:80px;
}

.hero h1{font-size:5rem}
.hero p{max-width:650px;margin:15px 0;color:#ddd}

.btn{
padding:14px 28px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.play{background:#1CE783}
.info{background:#333;color:white}

.section{padding:35px 40px}
.row{display:flex;gap:14px;overflow-x:auto}
.row::-webkit-scrollbar{display:none}

.poster{
min-width:220px;
height:330px;
border-radius:12px;
overflow:hidden;
transition:.35s;
background:#222;
}

.poster:hover{
transform:scale(1.08);
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>
<body>

<div id="splash">
<div class="logoWrap">
<div class="logoGlow"></div>
<img src="atmo-logo.png" class="logo">
<div class="tv">tv</div>
</div>
</div>

<div id="login" class="hidden">
<div class="card">
<center>
<img src="atmo-logo.png" width="80">
<h1>ATMO tv</h1>
</center>
<br>
<input placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="showHome()">ACCEDI</button>
</div>
</div>

<div id="home" class="hidden">
<header>
<div><b>ATMO tv</b></div>
<div>Home · Film · Serie · Anime · La mia lista</div>
</header>

<section class="hero">
<div>
<h1>ATMO ORIGINALS</h1>
<p>Esperienza streaming premium ispirata alle moderne piattaforme TV.</p>
<button class="btn play">▶ Guarda ora</button>
<button class="btn info">Dettagli</button>
</div>
</section>

<div class="section">
<h2>Continua a guardare</h2><br>
<div class="row">
<div class="poster"><img src="https://picsum.photos/220/330?1"></div>
<div class="poster"><img src="https://picsum.photos/220/330?2"></div>
<div class="poster"><img src="https://picsum.photos/220/330?3"></div>
<div class="poster"><img src="https://picsum.photos/220/330?4"></div>
<div class="poster"><img src="https://picsum.photos/220/330?5"></div>
</div>
</div>

<div class="section">
<h2>Trending</h2><br>
<div class="row">
<div class="poster"><img src="https://picsum.photos/220/330?6"></div>
<div class="poster"><img src="https://picsum.photos/220/330?7"></div>
<div class="poster"><img src="https://picsum.photos/220/330?8"></div>
<div class="poster"><img src="https://picsum.photos/220/330?9"></div>
<div class="poster"><img src="https://picsum.photos/220/330?10"></div>
</div>
</div>
</div>

<script>
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("login").classList.remove("hidden");
},4000);

function showHome(){
document.getElementById("login").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
}
</script>

</body>
</html>
